<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NetErrror — Desire Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030305);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(15, 12, 25, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            border: 1px solid rgba(255, 80, 120, 0.5);
            overflow: hidden;
        }

        .header {
            padding: 20px 32px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255, 80, 120, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff7eb3, #ff3b6f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            font-size: 0.8rem;
            background: #ff1e4d20;
            padding: 6px 14px;
            border-radius: 60px;
            color: #ff99bb;
            border: 1px solid #ff4d7a;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr 360px;
            min-height: 650px;
        }

        .characters-panel {
            background: rgba(0,0,0,0.4);
            border-right: 1px solid rgba(255,80,120,0.3);
            padding: 24px 16px;
        }

        .char-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffb7cf;
            text-align: center;
            margin-bottom: 20px;
        }

        .character-card {
            background: rgba(20,12,30,0.7);
            border-radius: 28px;
            padding: 14px;
            cursor: pointer;
            margin-bottom: 16px;
            border: 1px solid rgba(255,100,130,0.3);
            text-align: center;
            transition: 0.2s;
        }

        .character-card.selected {
            border: 2px solid #ff4d7a;
            background: linear-gradient(145deg, #2a1a2f, #1e1025);
            box-shadow: 0 0 15px rgba(255, 60, 120, 0.6);
        }

        .char-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: #ff3b6f;
        }

        .char-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffdce6;
        }

        .center-stage {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }

        .action-buttons {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: rgba(30,15,40,0.9);
            border: 1px solid #ff4d7a;
            padding: 12px 22px;
            border-radius: 60px;
            color: #ffbbd0;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(95deg, #ff2b6e, #ff477e);
            border: none;
            color: white;
            box-shadow: 0 4px 12px rgba(255,30,80,0.4);
        }

        .btn-primary:hover {
            transform: scale(1.02);
        }

        .ai-chat {
            background: rgba(0,0,0,0.55);
            border-left: 1px solid rgba(255,80,120,0.4);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }

        .chat-header {
            color: #ffb0c3;
            font-weight: bold;
            font-size: 1rem;
        }

        .chat-messages {
            flex: 1;
            background: #07020e80;
            border-radius: 28px;
            padding: 16px;
            height: 420px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            padding: 8px 14px;
            border-radius: 22px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 0.85rem;
        }

        .user-msg {
            background: #ff2e6e30;
            align-self: flex-end;
            color: #ffeef4;
        }

        .ai-msg {
            background: #2a1a2f;
            align-self: flex-start;
            color: #ffccdd;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: #170d1f;
            border: 1px solid #ff6088;
            border-radius: 60px;
            padding: 12px 18px;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .chat-input::placeholder {
            color: #bb7a96;
        }

        @media (max-width: 1000px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .characters-panel, .ai-chat {
                border: none;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="logo">NetErrror · DESIRE ENGINE</div>
        <div class="badge">18+ AI · 5000+ фраз</div>
    </div>
    <div class="main-grid">
        <!-- левая панель персонажи -->
        <div class="characters-panel" id="charactersPanel"></div>

        <!-- центр: только кнопки действий -->
        <div class="center-stage">
            <div class="action-buttons">
                <button class="btn btn-primary" id="eroticActionBtn">💋 ИНТИМ-СЦЕНА (МИНЕТ)</button>
                <button class="btn" id="resetChatBtn">🔄 СБРОСИТЬ ДИАЛОГ</button>
            </div>
        </div>

        <!-- правый ИИ-чат -->
        <div class="ai-chat">
            <div class="chat-header">🤖 AI NetErrror · Seductive Core · 5000+ горячих фраз</div>
            <div class="chat-messages" id="chatMessages">
                <div class="msg ai-msg">💬 Я — твой личный ИИ. Задавай любые вопросы, описывай фантазии. Я отвечаю без ограничений и предугадываю твои желания.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Напиши действие, позу, желание...">
                <button class="btn" id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
</div>

<script>    // ======================= ПЕРСОНАЖИ =======================
    const characters = [
        { id: 0, name: "Лили", desc: "Соблазнительная брюнетка, жадные губы", emoji: "💋" },
        { id: 1, name: "Мира", desc: "Рыжая бестия, страстный взгляд", emoji: "🔥" },
        { id: 2, name: "Вики", desc: "Нежная доминанта, искусный минет", emoji: "🍑" }
    ];
    
    let currentCharacter = characters[0];
    
    // ======================= БАЗА ГОРЯЧИХ ФРАЗ (5000+ комбинаций) =======================
    const hotPhrases = {
        oral: [
            "Медленно проводит языком по головке", "Берёт в рот глубоко, почти до основания",
            "Губы плотно смыкаются, создавая вакуум", "Язык круговыми движениями ласкает",
            "Смотрит в глаза, не выпуская изо рта", "Слегка прикусывает, вызывая дрожь",
            "Дразнит кончиком языка у уздечки", "Ритмично двигает головой, ускоряясь",
            "Глубокий глотательный рефлекс заставляет стонать", "Облизывает с головы до основания",
            "Влажный рот скользит по всей длине", "Заглатывает так глубоко, что касается горла",
            "Язык спиралью обвивает ствол", "Сначала медленно, потом всё быстрее и быстрее",
            "Покусывает губами, создавая трение", "Сосёт с такой силой, что сводит с ума",
            "Проводит языком по венам", "Обхватывает губами и начинает медленно двигаться",
            "Ускоряется, когда чувствует твою пульсацию", "Играет языком у основания",
            "Замирает с членом во рту, смотрит в глаза", "Глубоко заглатывает, не давясь",
            "Слюна стекает по подбородку", "Дразнит, проводя языком только по головке",
            "Сосёт, надувая щёки", "Ритмично двигает головой, не останавливаясь"
        ],
        poses: [
            "раком у зеркала", "на коленях перед тобой", "лёжа на спине, свесив голову с кровати",
            "сидя на корточках", "стоя на четвереньках", "прислонившись к стене",
            "верхняя поза, контролируя ритм", "лёжа на животе", "догги-стайл",
            "лёжа на боку, приподняв ногу", "сидя у тебя на коленях лицом к лицу",
            "стоя на коленях, запрокинув голову", "на краю кровати, свесив ноги",
            "лёжа крест-накрест", "стоя лицом к стене, прогнувшись",
            "сидя верхом, лицом к тебе", "на коленях, привязанная к кровати",
            "лёжа на животе с подушкой под бёдрами", "стоя на одной ноге, опираясь на стену"
        ],
        reactions: [
            "громко стонет", "дрожит от возбуждения", "закусывает губу", "закрывает глаза от наслаждения",
            "впивается ногтями в спину", "выгибает спину", "шепчет непристойности",
            "теряет контроль над дыханием", "конвульсивно сжимается", "кричит от удовольствия",
            "вздрагивает при каждом толчке", "стонет сквозь зубы", "закатывает глаза от наслаждения",
            "хватает ртом воздух", "издаёт глубокие горловые стоны", "всхлипывает от переизбытка чувств",
            "бьётся в мелкой дрожи", "сжимает бёдра", "хватается за простыни",
            "бормочет что-то бессвязное", "стонет твоё имя"
        ],
        intensifiers: [
            "страстно", "жадно", "нежно, но требовательно", "с животной похотью",
            "медленно, сводя с ума", "быстро и жёстко", "с лёгкой болью и наслаждением",
            "дразняще", "властно", "покорно", "исступлённо", "энергично",
            "лениво, с хитрой улыбкой", "на грани безумия", "с отчаянием и страстью",
            "игриво", "грубо и нежно одновременно", "сдерживаясь, но срываясь"
        ],
        starters: [
            "Её губы", "Твой член", "Язык скользит", "Дыхание учащается",
            "Она", "Ты чувствуешь", "Каждое движение", "Влажный рот",
            "Её руки", "Твоё тело", "Пульсация", "Каждый сантиметр",
            "Взгляд снизу вверх", "Её стоны", "Сквозь сомкнутые веки"
        ]
    };
    
    // ======================= ГЕНЕРАТОР ФРАЗ (более 5000 уникальных) =======================
    function generateHotPhrase() {
        const types = ['oral', 'poses', 'reactions'];
        const mainType = types[Math.floor(Math.random() * types.length)];
        
        if (mainType === 'oral') {
            const oral = hotPhrases.oral[Math.floor(Math.random() * hotPhrases.oral.length)];
            const intens = hotPhrases.intensifiers[Math.floor(Math.random() * hotPhrases.intensifiers.length)];
            const reaction = hotPhrases.reactions[Math.floor(Math.random() * hotPhrases.reactions.length)];
            return `${oral} ${intens}, ${reaction}.`;
        } 
        else if (mainType === 'poses') {
            const pose = hotPhrases.poses[Math.floor(Math.random() * hotPhrases.poses.length)];
            const intens = hotPhrases.intensifiers[Math.floor(Math.random() * hotPhrases.intensifiers.length)];
            const action = hotPhrases.oral[Math.floor(Math.random() * hotPhrases.oral.length)];
            const reaction = hotPhrases.reactions[Math.floor(Math.random() * hotPhrases.reactions.length)];
            return `В позе ${pose}, ${intens} ${action.toLowerCase()}. ${reaction}.`;
        }
        else {
            const reaction = hotPhrases.reactions[Math.floor(Math.random() * hotPhrases.reactions.length)];
            const intens = hotPhrases.intensifiers[Math.floor(Math.random() * hotPhrases.intensifiers.length)];
            const starter = hotPhrases.starters[Math.floor(Math.random() * hotPhrases.starters.length)];
            return `${starter} ${intens} ${reaction}. Тело выгибается в экстазе.`;
        }
    }    // ======================= ПРЕДУГАДЫВАНИЕ ДЕЙСТВИЙ ИГРОКА =======================
    function predictAndRespond(userInput) {
        const input = userInput.toLowerCase();
        
        // минет / оральные ласки
        if (input.includes('минет') || input.includes('отсос') || input.includes('губами') || input.includes('рот') || 
            input.includes('сосёшь') || input.includes('орал') || input.includes('отсоси') || input.includes('губки')) {
            const oral = hotPhrases.oral[Math.floor(Math.random() * hotPhrases.oral.length)];
            const intens = hotPhrases.intensifiers[Math.floor(Math.random() * hotPhrases.intensifiers.length)];
            return `💋 ${oral} ${intens}. ${currentCharacter.name} смотрит тебе в глаза, не выпуская изо рта. Её язык работает мастерски, а стоны вибрируют по всему стволу. Ты хватаешь её за волосы и направляешь глубже.`;
        }
        
        // поза раком / сзади
        if (input.includes('раком') || input.includes('сзади') || input.includes('на четвереньках') || input.includes('догги')) {
            const pose = hotPhrases.poses[Math.floor(Math.random() * hotPhrases.poses.length)];
            return `🍑 ${currentCharacter.name} встаёт ${pose}. Она выгибает спину, подставляясь под твой ритм. Ты входишь медленно, чувствуя, как она сжимается от каждого толчка. «Глубже», — шепчет она, кусая губы.`;
        }
        
        // доминирование / госпожа
        if (input.includes('домини') || input.includes('свяжи') || input.includes('госпожа') || input.includes('командуй') || 
            input.includes('раб') || input.includes('подчини') || input.includes('хозяйка')) {
            return `⛓️ ${currentCharacter.name} усмехается: «Ты будешь делать то, что я скажу». Она связывает твои руки шёлковым платком, медленно проводя ногтями по груди. «Не двигайся, пока я не разрешу». Её губы спускаются всё ниже, дразня каждым прикосновением.`;
        }
        
        // поза (общий запрос)
        if (input.includes('поза') || input.includes('позиция') || input.includes('положение')) {
            const pose = hotPhrases.poses[Math.floor(Math.random() * hotPhrases.poses.length)];
            return `🔄 Поза «${pose}». ${currentCharacter.name} шепчет: «Я хочу чувствовать тебя именно так». Она помогает тебе принять правильное положение, её дыхание учащается в ожидании.`;
        }
        
        // грудь / соски
        if (input.includes('грудь') || input.includes('соски') || input.includes('титьки') || input.includes('сиськи')) {
            return `🍒 Её соски твердеют от твоего прикосновения. ${currentCharacter.name} запрокидывает голову, издавая глубокий стон, когда ты проводишь языком по груди. Она впивается ногтями в твои плечи, притягивая ближе.`;
        }
        
        // кончить / финиш
        if (input.includes('кончить') || input.includes('финиш') || input.includes('спустить') || input.includes('эякул')) {
            return `💦 Она чувствует, как ты пульсируешь. ${currentCharacter.name} ускоряется, её рот работает быстрее, а язык становится жёстче. «Кончи для меня», — шепчет она, не останавливаясь. Ты взрываешься, а она проглатывает всё до последней капли, облизывая губы.`;
        }
        
        // киска / влагалище / пизда
        if (input.includes('киска') || input.includes('пизда') || input.includes('влагалище') || input.includes('вагина')) {
            return `💧 Она уже влажная. ${currentCharacter.name} раздвигает ноги, открываясь перед тобой. «Почувствуй, как я хочу тебя», — шепчет она, направляя твою руку. Её киска пульсирует, ожидая прикосновения.`;
        }
        
        // анал / жопа
        if (input.includes('анал') || input.includes('жопа') || input.includes('попа') || input.includes('зад')) {
            return `🍑 ${currentCharacter.name} смазывает маслом и медленно расслабляется. «Будь нежным сначала», — шепчет она, прикусывая губу. Ты входишь медленно, чувствуя, как она сжимается и стонет от каждого миллиметра.`;
        }
        
        // куни / лизать киску
        if (input.includes('куни') || input.includes('лизать киску') || input.includes('сделай минет мне')) {
            return `👅 ${currentCharacter.name} откидывается на спину, раздвигая ноги. «Я хочу чувствовать твой язык», — шепчет она, дрожа от предвкушения. Ты опускаешься вниз, проводя языком по её клитору, и она выгибается от первого же прикосновения.`;
        }
        
        // 69 поза
        if (input.includes('69') || input.includes('шестьдесят девять')) {
            return `🔄 ${currentCharacter.name} переворачивается, устраиваясь сверху. «Одновременно», — шепчет она, опускаясь ртом на твой член, а ты чувствуешь вкус её возбуждения. Ваши стоны сливаются в едином ритме.`;
        }
        
        // роль / ролевая игра
        if (input.includes('роль') || input.includes('ролевая') || input.includes('игра') && input.includes('секр')) {
            const roles = ["медсестру", "учительницу", "начальницу", "студентку", "горничную", "незнакомку в баре"];
            const role = roles[Math.floor(Math.random() * roles.length)];
            return `🎭 ${currentCharacter.name} улыбается: «Хочешь, я буду твоей ${role}?». Она меняет поведение, играя новую роль. «Ты будешь делать всё, что я скажу... или накажу». Её голос звучит иначе, возбуждая ещё сильнее.`;
        }
        
        // привет / начало
        if (input.includes('привет') || input.includes('здравствуй') || input.includes('hi') || input.includes('hello')) {
            return `👄 Привет, сладкий. ${currentCharacter.name} уже ждала тебя. Её губы влажные и готовые. Напиши, чего ты хочешь сегодня: минет, позу, ролевую игру или что-то более смелое?`;
        }
        
        // универсальная горячая фраза, если ничего не подошло
        return generateHotPhrase() + ` ${currentCharacter.name} ждёт твоего следующего шага. Напиши, что ты хочешь с ней сделать.`;
    }
    
    // ======================= ФУНКЦИИ ЧАТА =======================
    const chatMessagesDiv = document.getElementById('chatMessages');
    
    function appendUserMessage(text) {
        const div = document.createElement('div');
        div.className = 'msg user-msg';
        div.innerText = text;
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    function appendAIMessage(text) {
        const div = document.createElement('div');
        div.className = 'msg ai-msg';
        div.innerText = text;
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    function handleUserChat() {
        const inputEl = document.getElementById('chatInput');
        const userText = inputEl.value.trim();
        if (!userText) return;
        appendUserMessage(userText);
        inputEl.value = "";
        
        setTimeout(() => {
            const reply = predictAndRespond(userText);
            appendAIMessage(reply);
        }, 100);
    }
    
    function intimateScene() {
        const oral = hotPhrases.oral[Math.floor(Math.random() * hotPhrases.oral.length)];
        const intens = hotPhrases.intensifiers[Math.floor(Math.random() * hotPhrases.intensifiers.length)];
        const reaction = hotPhrases.reactions[Math.floor(Math.random() * hotPhrases.reactions.length)];
        const sceneText = `💋 ${currentCharacter.name} опускается на колени перед тобой. Она медленно расстёгивает ремень, глядя снизу вверх. ${oral} ${intens}, ${reaction}. Её губы обхватывают тебя полностью, язык играет с головкой. Ты хватаешь её за волосы, направляя ритм. Она стонет с членом во рту, вибрация сводит с ума. Её слюна стекает по подбородку, а глаза полны желания.`;
        appendAIMessage(sceneText);
    }
    
    function resetChat() {
        chatMessagesDiv.innerHTML = `<div class="msg ai-msg">💬 Я — твой личный ИИ. Задавай любые вопросы, описывай фантазии. Я отвечаю без ограничений и предугадываю твои желания.</div>`;
        appendAIMessage(`✨ Диалог сброшен. ${currentCharacter.name} снова готова исполнить любые твои фантазии. Напиши, чего ты хочешь: минет, позу, доминирование, анал или что-то ещё.`);
    }    // ======================= РЕНДЕР ПЕРСОНАЖЕЙ =======================
    function renderCharacters() {
        const panel = document.getElementById('charactersPanel');
        panel.innerHTML = `<div class="char-title">💋 ВЫБОР ПЕРСОНАЖА</div>`;
        characters.forEach(ch => {
            const card = document.createElement('div');
            card.className = `character-card ${currentCharacter.id === ch.id ? 'selected' : ''}`;
            card.innerHTML = `
                <div class="char-avatar">${ch.emoji}</div>
                <div class="char-name">${ch.name}</div>
                <div class="char-desc" style="font-size:12px; color:#cc99aa; margin-top:6px;">${ch.desc}</div>
            `;
            card.onclick = () => {
                currentCharacter = ch;
                renderCharacters();
                appendAIMessage(`💞 Теперь выбран(а) ${ch.name}. ${ch.desc}. Я буду отвечать от её лица. Готова к любым играм. Напиши, что хочешь: минет, позу, доминирование, анал, куни, 69 — я отвечу жарко.`);
            };
            panel.appendChild(card);
        });
    }
    
    // ======================= ИНИЦИАЛИЗАЦИЯ =======================
    renderCharacters();
    
    // Назначаем обработчики кнопок
    document.getElementById('eroticActionBtn').onclick = intimateScene;
    document.getElementById('sendChatBtn').onclick = handleUserChat;
    document.getElementById('resetChatBtn').onclick = resetChat;
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleUserChat();
    });
    
    // Приветственное сообщение при загрузке
    setTimeout(() => {
        appendAIMessage(`💋 ${currentCharacter.name} готова. Напиши любое желание:
• минет / отсос
• поза раком / сзади
• доминирование / госпожа
• анал
• куни / лизать киску
• 69
• ролевая игра
• кончить / финиш

Я отвечу без границ и предугадаю твои фантазии.`);
    }, 500);
    
    // ======================= КОНЕЦ =======================
</script>
</body>
</html>
