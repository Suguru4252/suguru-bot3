<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>NetErrror — Desire Engine (GAY + STRAIGHT)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(15, 12, 25, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            border: 1px solid rgba(255, 80, 120, 0.5);
            overflow: hidden;
        }

        .header {
            padding: 20px 32px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255, 80, 120, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff7eb3, #ff3b6f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            font-size: 0.8rem;
            background: #ff1e4d20;
            padding: 6px 14px;
            border-radius: 60px;
            color: #ff99bb;
            border: 1px solid #ff4d7a;
        }

        .gender-selector {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.4);
            padding: 8px 20px;
            border-radius: 60px;
            margin: 12px 20px 0 20px;
        }

        .gender-btn {
            background: rgba(30,15,40,0.7);
            border: 1px solid #ff4d7a;
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffbbd0;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .gender-btn.active {
            background: linear-gradient(95deg, #ff2b6e, #ff477e);
            color: white;
            border: none;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr 360px;
            min-height: 650px;
        }

        .characters-panel {
            background: rgba(0,0,0,0.4);
            border-right: 1px solid rgba(255,80,120,0.3);
            padding: 24px 16px;
        }

        .char-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffb7cf;
            text-align: center;
            margin-bottom: 20px;
        }

        .character-card {
            background: rgba(20,12,30,0.7);
            border-radius: 28px;
            padding: 14px;
            cursor: pointer;
            margin-bottom: 16px;
            border: 1px solid rgba(255,100,130,0.3);
            text-align: center;
            transition: 0.2s;
        }

        .character-card.selected {
            border: 2px solid #ff4d7a;
            background: linear-gradient(145deg, #2a1a2f, #1e1025);
            box-shadow: 0 0 15px rgba(255, 60, 120, 0.6);
        }

        .char-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: #ff3b6f;
        }

        .char-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffdce6;
        }

        .center-stage {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }

        .action-buttons {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: rgba(30,15,40,0.9);
            border: 1px solid #ff4d7a;
            padding: 12px 22px;
            border-radius: 60px;
            color: #ffbbd0;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(95deg, #ff2b6e, #ff477e);
            border: none;
            color: white;
            box-shadow: 0 4px 12px rgba(255,30,80,0.4);
        }

        .btn-primary:hover {
            transform: scale(1.02);
        }

        .ai-chat {
            background: rgba(0,0,0,0.55);
            border-left: 1px solid rgba(255,80,120,0.4);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }

        .chat-header {
            color: #ffb0c3;
            font-weight: bold;
            font-size: 1rem;
        }

        .chat-messages {
            flex: 1;
            background: #07020e80;
            border-radius: 28px;
            padding: 16px;
            height: 420px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            padding: 8px 14px;
            border-radius: 22px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 0.85rem;
        }

        .user-msg {
            background: #ff2e6e30;
            align-self: flex-end;
            color: #ffeef4;
        }

        .ai-msg {
            background: #2a1a2f;
            align-self: flex-start;
            color: #ffccdd;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: #170d1f;
            border: 1px solid #ff6088;
            border-radius: 60px;
            padding: 12px 18px;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .chat-input::placeholder {
            color: #bb7a96;
        }

        @media (max-width: 1000px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .characters-panel, .ai-chat {
                border: none;
            }
        }
    </style>
</head>

    const chatMessagesDiv = document.getElementById('chatMessages');
    
    function appendUserMessage(text) {
        const div = document.createElement('div');
        div.className = 'msg user-msg';
        div.innerText = text;
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    function appendAIMessage(text) {
        const div = document.createElement('div');
        div.className = 'msg ai-msg';
        div.innerText = text;
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    function handleUserChat() {
        const inputEl = document.getElementById('chatInput');
        const userText = inputEl.value.trim();
        if (!userText) return;
        appendUserMessage(userText);
        inputEl.value = "";
        
        setTimeout(() => {
            const reply = predictAndRespond(userText);
            appendAIMessage(reply);
        }, 100);
    }

    function renderCharacters() {
        const panel = document.getElementById('charactersPanel');
        const charactersList = currentGender === "straight" ? straightCharacters : gayCharacters;
        
        if (!currentCharacter || currentCharacter.gender !== currentGender) {
            currentCharacter = charactersList[0];
        }
        
        panel.innerHTML = `<div class="char-title">💋 ВЫБЕРИ МЕНЯ (${currentGender === "straight" ? "ДЕВУШКИ" : "ПАРНИ"})</div>`;
        
        charactersList.forEach(ch => {
            const card = document.createElement('div');
            card.className = `character-card ${currentCharacter.id === ch.id ? 'selected' : ''}`;
            card.innerHTML = `
                <div class="char-avatar">${ch.emoji}</div>
                <div class="char-name">${ch.name}</div>
                <div class="char-desc" style="font-size:12px; color:#cc99aa; margin-top:6px;">${ch.desc}</div>
            `;
            card.onclick = () => {
                currentCharacter = ch;
                renderCharacters();
                const pronoun = currentGender === "straight" ? "готова" : "готов";
                appendAIMessage(`💞 Ты выбрал меня — ${ch.name}. ${ch.desc}. Я ${pronoun} исполнить любые твои фантазии. Напиши, что хочешь со мной сделать: минет, анал, позу раком, доминирование, 69, куни? Я жду твоих команд.`);
            };
            panel.appendChild(card);
        });
    }
    
    // ======================= ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ =======================
    function switchGender(gender) {
        currentGender = gender;
        
        document.querySelectorAll('.gender-btn').forEach(btn => {
            if (btn.dataset.gender === gender) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        const charactersList = currentGender === "straight" ? straightCharacters : gayCharacters;
        currentCharacter = charactersList[0];
        
        renderCharacters();
        
        const genderText = currentGender === "straight" ? "СТРЕЙТ (М+Ж)" : "ГЕЙ (М+М)";
        const charName = currentCharacter.name;
        
        if (currentGender === "straight") {

    currentCharacter = straightCharacters[0];
    renderCharacters();
    
    document.getElementById('eroticActionBtn').onclick = intimateScene;
    document.getElementById('sendChatBtn').onclick = handleUserChat;
    document.getElementById('resetChatBtn').onclick = resetChat;
    document.getElementById('chatInput').addEventListener('keypress', (e) => {

    document.querySelectorAll('.gender-btn').forEach(btn => {

Я жду твоих грязных желаний. Пиши, что хочешь.`);
