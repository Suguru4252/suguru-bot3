<!DOCTYPE html>
<html lang="ru">
<head>

        }

            background: rgba(0,0,0,0.5);

            justify-content: space-between;

        }

            background: linear-gradient(135deg, #ff7eb3, #ff3b6f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            font-size: 0.8rem;
            background: #ff1e4d20;
            padding: 6px 14px;
            border-radius: 60px;
            color: #ff99bb;
            border: 1px solid #ff4d7a;
        }

        .gender-selector {

            background: rgba(0,0,0,0.4);

            padding: 6px 18px;
            border-radius: 40px;
            color: #ffbbd0;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .gender-btn.active {
            background: linear-gradient(95deg, #ff2b6e, #ff477e);
            color: white;
            border: none;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr 360px;
            min-height: 650px;
        }

        .characters-panel {
            background: rgba(0,0,0,0.4);
            border-right: 1px solid rgba(255,80,120,0.3);
            padding: 24px 16px;
        }

            color: #ffb7cf;

            border: 1px solid rgba(255,100,130,0.3);
            text-align: center;
            transition: 0.2s;

            box-shadow: 0 0 15px rgba(255, 60, 120, 0.6);

            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: #ff3b6f;

            font-weight: bold;
            color: #ffdce6;
        }

            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }

            flex-wrap: wrap;
            justify-content: center;
        }

            border: 1px solid #ff4d7a;
            padding: 12px 22px;
            border-radius: 60px;
            color: #ffbbd0;
            font-weight: bold;

            background: linear-gradient(95deg, #ff2b6e, #ff477e);
            border: none;
            color: white;
            box-shadow: 0 4px 12px rgba(255,30,80,0.4);
        }

        }

            background: rgba(0,0,0,0.55);
            border-left: 1px solid rgba(255,80,120,0.4);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }

        .chat-header {
            color: #ffb0c3;
            font-weight: bold;
            font-size: 1rem;
        }

        .chat-messages {
            flex: 1;
            background: #07020e80;
            border-radius: 28px;
            padding: 16px;
            height: 420px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            padding: 8px 14px;
            border-radius: 22px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 0.85rem;
        }

        .user-msg {
            background: #ff2e6e30;
            align-self: flex-end;
            color: #ffeef4;
        }

        .ai-msg {
            background: #2a1a2f;
            align-self: flex-start;
            color: #ffccdd;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: #170d1f;
            border: 1px solid #ff6088;
            border-radius: 60px;
            padding: 12px 18px;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .chat-input::placeholder {
            color: #bb7a96;
        }

        @media (max-width: 1000px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .characters-panel, .ai-chat {
                border: none;
            }
        }
    </style>
</head>

    }    // ======================= ФУНКЦИИ ЧАТА =======================
    const chatMessagesDiv = document.getElementById('chatMessages');
    
    function appendUserMessage(text) {
        const div = document.createElement('div');
        div.className = 'msg user-msg';
        div.innerText = text;
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    function appendAIMessage(text) {
        const div = document.createElement('div');
        div.className = 'msg ai-msg';
        div.innerText = text;
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    function handleUserChat() {
        const inputEl = document.getElementById('chatInput');
        const userText = inputEl.value.trim();
        if (!userText) return;
        appendUserMessage(userText);
        inputEl.value = "";
        
        setTimeout(() => {
            const reply = predictAndRespond(userText);
            appendAIMessage(reply);
        }, 100);
    }
    
    // ======================= ИНТИМ-СЦЕНА (СТРЕЙТ + ГЕЙ) =======================

        const char = currentCharacter;
        const charName = char ? char.name : (currentGender === "straight" ? "девушка" : "парень");
        
        if (currentGender === "straight") {
            const oral = phrases.oral[Math.floor(Math.random() * phrases.oral.length)];
            const intens = phrases.intensifiers[Math.floor(Math.random() * phrases.intensifiers.length)];
            const reaction = phrases.reactions[Math.floor(Math.random() * phrases.reactions.length)];

            const oral = phrases.oral[Math.floor(Math.random() * phrases.oral.length)];
            const intens = phrases.intensifiers[Math.floor(Math.random() * phrases.intensifiers.length)];
            const reaction = phrases.reactions[Math.floor(Math.random() * phrases.reactions.length)];
            const sceneText = `🍆 ${charName} становится на колени перед тобой. Он медленно облизывает губы, глядя снизу вверх. ${oral} ${intens}, ${reaction}. Его рот плотно обхватывает твой член, язык работает умело и жадно. Ты хватаешь его за волосы, направляя глубже. Он стонет с членом во рту, вибрация сводит с ума. Слюна стекает по подбородку, он заглатывает всё глубже, не останавливаясь. Его рука сжимает твои яйца, усиливая ощущения. «Трахни мой рот», — шепчет он, ускоряясь.`;
            appendAIMessage(sceneText);
        }
    }
    
    function resetChat() {
        const char = currentCharacter;
        const charName = char ? char.name : (currentGender === "straight" ? "девушка" : "парень");
        const genderText = currentGender === "straight" ? "СТРЕЙТ (М+Ж)" : "ГЕЙ (М+М)";
        chatMessagesDiv.innerHTML = `<div class="msg ai-msg">💬 Я — твой личный ИИ. Режим: ${genderText}. Задавай любые вопросы, описывай фантазии. Я отвечаю без ограничений и предугадываю твои желания.</div>`;
        appendAIMessage(`✨ Диалог сброшен. ${charName} снова готов(а) исполнить любые твои фантазии. Напиши, чего ты хочешь: минет, анал, позу раком, доминирование, 69 или что-то ещё.`);
    }    // ======================= РЕНДЕР ПЕРСОНАЖЕЙ =======================
    function renderCharacters() {
        const panel = document.getElementById('charactersPanel');
        const charactersList = currentGender === "straight" ? straightCharacters : gayCharacters;
        
        // Если текущий персонаж не из выбранного режима или null, выбираем первого
        if (!currentCharacter || currentCharacter.gender !== currentGender) {
            currentCharacter = charactersList[0];
        }
        
        panel.innerHTML = `<div class="char-title">💋 ВЫБОР ПЕРСОНАЖА (${currentGender === "straight" ? "ДЕВУШКИ" : "ПАРНИ"})</div>`;
        
        charactersList.forEach(ch => {
            const card = document.createElement('div');
            card.className = `character-card ${currentCharacter.id === ch.id ? 'selected' : ''}`;
            card.innerHTML = `
                <div class="char-avatar">${ch.emoji}</div>
                <div class="char-name">${ch.name}</div>
                <div class="char-desc" style="font-size:12px; color:#cc99aa; margin-top:6px;">${ch.desc}</div>
            `;
            card.onclick = () => {
                currentCharacter = ch;
                renderCharacters();
                const pronoun = currentGender === "straight" ? "готова" : "готов";
                appendAIMessage(`💞 Теперь выбран ${ch.name}. ${ch.desc}. ${ch.name} ${pronoun} исполнить любые твои фантазии. Напиши, что хочешь: минет, анал, позу, доминирование, 69 — я отвечу жарко.`);
            };
            panel.appendChild(card);
        });
    }
    
    // ======================= ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ =======================
    function switchGender(gender) {
        currentGender = gender;
        
        // Обновляем активную кнопку
        document.querySelectorAll('.gender-btn').forEach(btn => {
            if (btn.dataset.gender === gender) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        // Переключаем персонажа
        const charactersList = currentGender === "straight" ? straightCharacters : gayCharacters;
        currentCharacter = charactersList[0];
        
        // Перерисовываем панель персонажей
        renderCharacters();
        
        // Очищаем чат и отправляем приветствие
        const genderText = currentGender === "straight" ? "СТРЕЙТ (М+Ж)" : "ГЕЙ (М+М)";
        const charName = currentCharacter.name;
        const welcomeMsg = currentGender === "straight" 
            ? `💋 Режим СТРЕЙТ активирован. Теперь ты с ${charName}. Она ждёт твоих команд. Напиши: минет, поза раком, анал, доминирование, 69.`
            : `🍆 Режим ГЕЙ активирован. Теперь ты с ${charName}. Он ждёт твоих команд. Напиши: минет, поза раком, анал, доминирование, 69.`;
        
        chatMessagesDiv.innerHTML = `<div class="msg ai-msg">💬 Я — твой личный ИИ. Режим: ${genderText}. Задавай любые вопросы, описывай фантазии. Я отвечаю без ограничений.</div>`;
        appendAIMessage(welcomeMsg);
    }
    
    // ======================= ИНИЦИАЛИЗАЦИЯ =======================
    // Устанавливаем начального персонажа
    currentCharacter = straightCharacters[0];
    renderCharacters();
    
    // Назначаем обработчики кнопок
    document.getElementById('eroticActionBtn').onclick = intimateScene;
    document.getElementById('sendChatBtn').onclick = handleUserChat;
    document.getElementById('resetChatBtn').onclick = resetChat;
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleUserChat();
    });
    
    // Обработчики переключения режимов
    document.querySelectorAll('.gender-btn').forEach(btn => {
        btn.onclick = () => {
            const gender = btn.dataset.gender;
            if (gender === "straight") switchGender("straight");
            if (gender === "gay") switchGender("gay");
        };
    });
    
    // Приветственное сообщение при загрузке
    setTimeout(() => {
        appendAIMessage(`💋 Добро пожаловать в NetErrror Desire Engine.
        
Выбери режим:
• СТРЕЙТ (М+Ж) — девушки
• ГЕЙ (М+М) — парни

Доступные команды:
• минет / отсос
• поза раком / сзади / догги
• доминирование / госпожа / господин
• анал
• 69
• кончить / финиш

Напиши любое желание — я отвечу жарко и без границ.`);
    }, 500);
    
    // ======================= КОНЕЦ =======================
</script>
