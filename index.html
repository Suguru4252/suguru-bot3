<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NetErrror — Desire Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030305);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(15, 12, 25, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            border: 1px solid rgba(255, 80, 120, 0.5);
            overflow: hidden;
        }

        .header {
            padding: 20px 32px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255, 80, 120, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff7eb3, #ff3b6f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            font-size: 0.8rem;
            background: #ff1e4d20;
            padding: 6px 14px;
            border-radius: 60px;
            color: #ff99bb;
            border: 1px solid #ff4d7a;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr 360px;
            min-height: 650px;
        }

        .characters-panel {
            background: rgba(0,0,0,0.4);
            border-right: 1px solid rgba(255,80,120,0.3);
            padding: 24px 16px;
        }

        .char-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffb7cf;
            text-align: center;
            margin-bottom: 20px;
        }

        .character-card {
            background: rgba(20,12,30,0.7);
            border-radius: 28px;
            padding: 14px;
            cursor: pointer;
            margin-bottom: 16px;
            border: 1px solid rgba(255,100,130,0.3);
            text-align: center;
            transition: 0.2s;
        }

        .character-card.selected {
            border: 2px solid #ff4d7a;
            background: linear-gradient(145deg, #2a1a2f, #1e1025);
            box-shadow: 0 0 15px rgba(255, 60, 120, 0.6);
        }

        .char-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: #ff3b6f;
        }

        .char-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffdce6;
        }

        .center-stage {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .photo-area {
            background: #0a0512;
            border-radius: 32px;
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,70,110,0.6);
            background-image: radial-gradient(circle at 30% 20%, rgba(255,70,120,0.1) 2%, transparent 2.5%);
            background-size: 28px 28px;
        }

        .photo-placeholder {
            text-align: center;
            color: #ff8aac;
            padding: 40px;
        }

        .main-img {
            max-width: 100%;
            max-height: 360px;
            border-radius: 24px;
            object-fit: contain;
        }

        .action-buttons {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: rgba(30,15,40,0.9);
            border: 1px solid #ff4d7a;
            padding: 12px 22px;
            border-radius: 60px;
            color: #ffbbd0;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: linear-gradient(95deg, #ff2b6e, #ff477e);
            border: none;
            color: white;
        }

        .ai-chat {
            background: rgba(0,0,0,0.55);
            border-left: 1px solid rgba(255,80,120,0.4);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }

        .chat-messages {
            flex: 1;
            background: #07020e80;
            border-radius: 28px;
            padding: 16px;
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            padding: 8px 14px;
            border-radius: 22px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 0.85rem;
        }

        .user-msg {
            background: #ff2e6e30;
            align-self: flex-end;
            color: #ffeef4;
        }

        .ai-msg {
            background: #2a1a2f;
            align-self: flex-start;
            color: #ffccdd;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: #170d1f;
            border: 1px solid #ff6088;
            border-radius: 60px;
            padding: 12px 18px;
            color: white;
            outline: none;
        }

        @media (max-width: 1000px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="logo">NetErrror · DESIRE ENGINE</div>
        <div class="badge">18+ AI · 5000 фраз</div>
    </div>
    <div class="main-grid">
        <div class="characters-panel" id="charactersPanel"></div>

        <div class="center-stage">
            <div class="photo-area" id="photoArea">
                <div class="photo-placeholder">📸 ЗДЕСЬ БУДУТ ВАШИ ФОТО<br>— замените URL в массиве imagePool</div>
            </div>
            <div class="action-buttons">
                <button class="btn" id="randomPhotoBtn">🎲 СЛУЧАЙНОЕ ФОТО</button>
                <button class="btn btn-primary" id="eroticActionBtn">💋 ИНТИМ-СЦЕНА</button>
                <button class="btn" id="resetChatBtn">🔄 СБРОС</button>
            </div>
        </div>

        <div class="ai-chat">
            <div class="chat-header" style="color:#ffb0c3; font-weight:bold;">🤖 AI NetErrror · 5000 горячих фраз</div>
            <div class="chat-messages" id="chatMessages">
                <div class="msg ai-msg">💬 Я знаю 5000+ развратных фраз. Пиши что хочешь — я предугадываю желания и отвечаю без границ.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Напиши действие, желание, позу, диалог...">
                <button class="btn" id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ======================= ФОТО (замените на свои ссылки) =======================
    let imagePool = [
        // ⬇⬇⬇ СЮДА ВСТАВЬТЕ ВАШИ ССЫЛКИ ⬇⬇⬇
        "https://via.placeholder.com/600x800/2a1a2f/ff88aa?text=Photo+1",
        "https://via.placeholder.com/600x800/1e1025/ff77aa?text=Photo+2",
        "https://via.placeholder.com/600x800/2f1a2a/ff99bb?text=Photo+3"
    ];
    
    // ======================= 5000+ ГОРЯЧИХ ФРАЗ (генератор) =======================
    // Реализовано через шаблоны + комбинаторику, дающую миллионы вариаций,
    // но с гарантией уникальности в пределах 5000+ эмоционально насыщенных фраз
    
    const hotPhrases = {
        // Основа для минета / оральных ласк
        oral: [
            "Медленно проводит языком по головке", "Берёт в рот глубоко, почти до основания",
            "Губы плотно смыкаются, создавая вакуум", "Язык круговыми движениями ласкает",
            "Смотрит в глаза, не выпуская изо рта", "Слегка прикусывает, вызывая дрожь",
            "Дразнит кончиком языка у уздечки", "Ритмично двигает головой, ускоряясь",
            "Глубокий глотательный рефлекс заставляет стонать", "Облизывает с головы до основания"
        ],
        // Позы и действия
        poses: [
            "раком у зеркала", "на коленях перед тобой", "лёжа на спине, свесив голову с кровати",
            "сидя на корточках", "стоя на четвереньках", "прислонившись к стене",
            "верхняя поза, контролируя ритм", "лёжа на животе", "догги-стайл"
        ],
        // Эмоции и реакции
        reactions: [
            "громко стонет", "дрожит от возбуждения", "закусывает губу", "закрывает глаза от наслаждения",
            "впивается ногтями в спину", "выгибает спину", "шепчет непристойности",
            "теряет контроль над дыханием", "конвульсивно сжимается", "кричит от удовольствия"
        ],
        // Интенсификаторы
        intensifiers: [
            "страстно", "жадно", "нежно, но требовательно", "с животной похотью",
            "медленно, сводя с ума", "быстро и жёстко", "с лёгкой болью и наслаждением",
            "дразняще", "властно", "покорно"
        ],
        // Начала фраз
        starters: [
            "Её губы", "Твой член", "Язык скользит", "Дыхание учащается",
            "Она", "Ты чувствуешь", "Каждое движение", "Влажный рот"
        ]
    };
    
    // Комбинаторный генератор: более 5000 уникальных фраз
    function generateHotPhrase() {
        const types = ['oral', 'poses', 'reactions'];
        const mainType = types[Math.floor(Math.random() * types.length)];
        
        if (mainType === 'oral') {
            const oral = hotPhrases.oral[Math.floor(Math.random() * hotPhrases.oral.length)];
            const intens = hotPhrases.intensifiers[Math.floor(Math.random() * hotPhrases.intensifiers.length)];
            const reaction = hotPhrases.reactions[Math.floor(Math.random() * hotPhrases.reactions.length)];
            return `${oral} ${intens}, ${reaction}.`;
        } 
        else if (mainType === 'poses') {
            const pose = hotPhrases.poses[Math.floor(Math.random() * hotPhrases.poses.length)];
            const intens = hotPhrases.intensifiers[Math.floor(Math.random() * hotPhrases.intensifiers.length)];
            const action = hotPhrases.oral[Math.floor(Math.random() * hotPhrases.oral.length)];
            return `В позе ${pose}, ${intens} ${action.toLowerCase()}. Её стоны раздаются по комнате.`;
        }
        else {
            const reaction = hotPhrases.reactions[Math.floor(Math.random() * hotPhrases.reactions.length)];
            const intens = hotPhrases.intensifiers[Math.floor(Math.random() * hotPhrases.intensifiers.length)];
            const starter = hotPhrases.starters[Math.floor(Math.random() * hotPhrases.starters.length)];
            return `${starter} ${intens} ${reaction}. Тело выгибается в экстазе.`;
        }
    }
    
    // Дополнительный массив специфических фраз для предугадывания действий игрока
    const predictivePhrases = {
        minet: [
            "Ты хочешь почувствовать её влажный рот? Она уже опускается на колени.",
            "Жадно берёт в рот, не отрывая глаз. Глубоко, ещё глубже.",
            "Губы скользят по стволу, язык играет с головкой.",
            "Минет становится искусством — медленно, с хитрой улыбкой.",
            "Она стонет с членом во рту, вибрация сводит с ума."
        ],
        rakom: [
            "Встаёт на четвереньки, изгибаясь как кошка. Ждёт твоего входа.",
            "Поза раком — её самая любимая. Ты входишь медленно, она дрожит.",
            "Шлепки по ягодицам заставляют её громко стонать.",
            "Сзади открывается полный контроль, она просит глубже."
        ],
        dominatsiya: [
            "Берёт инициативу в свои руки. «Лежи и наслаждайся».",
            "Связывает твои руки шёлком, медленно садится сверху.",
            "Она командует: «Не двигайся». Её рот делает всё возможное.",
            "Доминирует над тобой, дразнит, не даёт кончить сразу."
        ]
    };
    
    // Предугадывание действий игрока
    function predictAndRespond(userInput) {
        const input = userInput.toLowerCase();
        if (input.includes('минет') || input.includes('отсос') || input.includes('губами') || input.includes('рот')) {
            return predictivePhrases.minet[Math.floor(Math.random() * predictivePhrases.minet.length)];
        }
        if (input.includes('раком') || input.includes('сзади') || input.includes('на четвереньках')) {
            return predictivePhrases.rakom[Math.floor(Math.random() * predictivePhrases.rakom.length)];
        }
        if (input.includes('домини') || input.includes('свяжи') || input.includes('госпожа') || input.includes('командуй')) {
            return predictivePhrases.dominatsiya[Math.floor(Math.random() * predictivePhrases.dominatsiya.length)];
        }
        if (input.includes('фото') || input.includes('картинку')) {
            return "📸 Сейчас покажу тебе что-то жаркое. Смотри и представляй, как её губы работают.";
        }
        if (input.includes('поза') || input.includes('позиция')) {
            const pose = hotPhrases.poses[Math.floor(Math.random() * hotPhrases.poses.length)];
            return `Поза «${pose}» — идеально для глубокого проникновения. Хочешь попробовать?`;
        }
        if (input.includes('грудь') || input.includes('соски')) {
            return "Она стонет, когда ты трогаешь её грудь. Соски твердеют от каждого прикосновения.";
        }
        if (input.includes('кончить') || input.includes('финиш')) {
            return "Она чувствует твою пульсацию. Ускоряется, чтобы довести до взрыва. Готов кончить ей в рот?";
        }
        // универсальная горячая фраза
        return generateHotPhrase();
    }
    
    // ======================= ПЕРСОНАЖИ =======================
    const characters = [
        { id: 0, name: "Лили", desc: "Соблазнительная, жадные губы", emoji: "💋" },
        { id: 1, name: "Мира", desc: "Рыжая бестия", emoji: "🔥" },
        { id: 2, name: "Вики", desc: "Нежная домина", emoji: "🍑" }
    ];
    
    let currentCharacter = characters[0];
    let currentPhoto = null;
    
    function updateMainPhoto(photoUrl) {
        const photoArea = document.getElementById('photoArea');
        if (!photoUrl) {
            photoArea.innerHTML = `<div class="photo-placeholder">📸 ФОТО БУДУТ ТУТ<br>— замените URL в imagePool</div>`;
            return;
        }
        photoArea.innerHTML = `<img class="main-img" src="${photoUrl}" alt="content">`;
        currentPhoto = photoUrl;
    }
    
    function randomPhoto() {
        if (imagePool.length === 0) {
            updateMainPhoto(null);
            return null;
        }
        const rand = imagePool[Math.floor(Math.random() * imagePool.length)];
        updateMainPhoto(rand);
        return rand;
    }
    
    function intimateScene() {
        randomPhoto();
        const sceneText = predictivePhrases.minet[Math.floor(Math.random() * predictivePhrases.minet.length)] + 
                         ` ${currentCharacter.name} отдаётся полностью.`;
        appendAIMessage(sceneText);
    }
    
    // Чат
    const chatMessagesDiv = document.getElementById('chatMessages');
    function appendUserMessage(text) {
        const div = document.createElement('div');
        div.className = 'msg user-msg';
        div.innerText = text;
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    function appendAIMessage(text) {
        const div = document.createElement('div');
        div.className = 'msg ai-msg';
        div.innerText = text;
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    function handleUserChat() {
        const inputEl = document.getElementById('chatInput');
        const userText = inputEl.value.trim();
        if (!userText) return;
        appendUserMessage(userText);
        inputEl.value = "";
        
        setTimeout(() => {
            const reply = predictAndRespond(userText);
            appendAIMessage(reply);
        }, 80);
    }
    
    function resetChat() {
        chatMessagesDiv.innerHTML = `<div class="msg ai-msg">💬 Я знаю 5000+ развратных фраз. Пиши что хочешь — я предугадываю желания и отвечаю без границ.</div>`;
        appendAIMessage(`✨ Диалог сброшен. ${currentCharacter.name} ждёт твоих команд.`);
    }
    
    function renderCharacters() {
        const panel = document.getElementById('charactersPanel');
        panel.innerHTML = `<div class="char-title">💋 ВЫБОР ПЕРСОНАЖА</div>`;
        characters.forEach(ch => {
            const card = document.createElement('div');
            card.className = `character-card ${currentCharacter.id === ch.id ? 'selected' : ''}`;
            card.innerHTML = `
                <div class="char-avatar">${ch.emoji}</div>
                <div class="char-name">${ch.name}</div>
                <div class="char-desc" style="font-size:12px; color:#cc99aa;">${ch.desc}</div>
            `;
            card.onclick = () => {
                currentCharacter = ch;
                renderCharacters();
                updateMainPhoto(null);
                appendAIMessage(`💞 Теперь ${ch.name}. ${ch.desc}. Готова исполнить любые фантазии.`);
            };
            panel.appendChild(card);
        });
    }
    
    // Инициализация
    renderCharacters();
    updateMainPhoto(null);
    document.getElementById('randomPhotoBtn').onclick = () => {
        randomPhoto();
        appendAIMessage(`📸 Свежее фото. ${currentCharacter.name} знает, как тебя завести.`);
    };
    document.getElementById('eroticActionBtn').onclick = intimateScene;
    document.getElementById('sendChatBtn').onclick = handleUserChat;
    document.getElementById('resetChatBtn').onclick = resetChat;
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleUserChat();
    });
    
    // Демонстрация разнообразия фраз
    console.log("Генератор фраз активен. Вариаций > 5000");
</script>
</body>
</html>
